<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>가게 등록</title>
</head>
<body>
<h1>가게 등록</h1>

<form id="storeForm">
    <label>가게 이름: <input type="text" name="name" required></label><br>
    <label>사업자번호: <input type="number" name="businessNumber" required></label><br>
    <label>연락처: <input type="text" name="contactNumber"></label><br>
    <label>주소: <input type="text" name="address"></label><br>

    <label>가게 상태:
        <select name="status" required>
            <option value="OPEN">OPEN</option>
            <option value="CLOSED">CLOSED</option>
        </select>
    </label><br>

    <label>가게 유형:
        <select name="storeType" required>
            <option value="RESTAURANT">RESTAURANT</option>
            <option value="CAFE">CAFE</option>
        </select>
    </label><br>

    <label>이미지 업로드: <input type="file" name="images" multiple></label><br><br>

    <button type="submit">등록하기</button>
</form>

<script>
    const form = document.getElementById('storeForm');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const formData = new FormData();

        const json = JSON.stringify({
            name: form.name.value,
            businessNumber: parseInt(form.businessNumber.value),
            contactNumber: form.contactNumber.value,
            address: form.address.value,
            status: form.status.value,
            storeType: form.storeType.value
        });

        // JSON payload를 multipart로 보낼 때 Blob으로 감쌈
        formData.append("request", new Blob([json], { type: "application/json" }));

        const images = form.images.files;
        for (let i = 0; i < images.length; i++) {
            formData.append("images", images[i]);
        }

        try {
            const res = await fetch("http://localhost:8080/stores", {
                method: "POST",
                headers: {
                    "Authorization": "Bearer eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJ0ZXN0dkBleGFtcGxlLmNvbSIsInVzZXJSb2xlIjoiTUFOQUdFUiIsImlhdCI6MTc1MDc0NTk2MCwiZXhwIjoxNzUwNzQ2MzIwfQ.G-VUk1buFsqpr53XJgxF26xgrNcg4M4zzoQ0AIQIATI"
                    // Content-Type은 설정하지 말 것! 브라우저가 boundary 포함 자동 생성
                },
                body: formData
            });

            const data = await res.json();
            alert("등록 완료: " + JSON.stringify(data));
        } catch (err) {
            console.error(err);
            alert("등록 실패");
        }
    });
</script>
</body>
</html>
