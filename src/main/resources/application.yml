server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: LuvIsLuvProject

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/${MYSQL_DATABASE}
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        show_sql: false
        format_sql: true
        use_sql_comments: true
    open-in-view: false

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000
      password: ${REDIS_PASSWORD}
    mongodb:
      uri: mongodb://localhost:27017/luvisluv

  elasticsearch:
    rest:
      uris: http://localhost:9200

jwt:
  secretKey: HK6CKboFMIKurRejEK46GaVX9ev+F4v1tagcz64wOvlE/YJWy0KGu/87w4zQizP39muqL9UcYqdYH6Y268A+IQ==
  accessToken:
    time: 360000
  refreshToken:
    time: 8640000

logging:
  level:
    root: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE

# 카카오 API Key
kakao:
  api:
    key: ${KAKAO_API_KEY}