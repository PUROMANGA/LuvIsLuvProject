name: Java CI

on:
  push:
    branches: [ "Ciel415-patch-1" ]
  pull_request:
    branches: [ "Ciel415-patch-1" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: bookstore-db
          MYSQL_ROOT_PASSWORD: "dkzkfld12#"
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: JDK 17 설치
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: MySQL 클라이언트 설치
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      - name: MySQL 연결 확인
        run: |
          for i in {1..30}; do
            echo "SELECT 1" | mysql -h 127.0.0.1 -P 3306 -u root -p"dkzkfld12#" bookstore-db && exit 0
            sleep 2
          done
          echo "MySQL did not start in time." && exit 1

      - name: gradlew 실행 권한 부여
        run: chmod +x ./gradlew

      - name: Gradle 빌드
        run: ./gradlew clean build --stacktrace
        env:
          SPRING_PROFILES_ACTIVE: test
